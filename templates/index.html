<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenie AI Learning Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Welcome to EduGenie 🧠✨</h1>
<p>Your personal AI tutor for learning support!</p>

<!-- Q&A -->
<form id="qaForm">
    <label><strong>Ask EduGenie a Question:</strong></label><br><br>
    <input type="text" id="question" placeholder="Why is the sky blue?" required>
    <button type="submit">Get Answer</button>
</form>
<div id="qaResult"></div>

<hr>

<!-- Explanation -->
<form id="explainForm">
    <label><strong>Need an Explanation?</strong></label><br><br>
    <input type="text" id="topic" placeholder="Photosynthesis" required>
    <button type="submit">Explain</button>
</form>
<div id="explanationResult"></div>

<hr>

<!-- Summary -->
<form id="summaryForm">
    <label><strong>Summarize a Paragraph:</strong></label><br><br>
    <input type="text" id="summaryText" placeholder="Paste text here" required>
    <button type="submit">Summarize</button>
</form>
<div id="summaryResult"></div>

<hr>

<!-- Quiz -->
<form id="quizForm">
    <label><strong>Generate a Quiz:</strong></label><br><br>
    <input type="text" id="quizText" placeholder="Solar System" required>
    <button type="submit">Generate Quiz</button>
</form>
<div id="quizResult"></div>

<hr>

<!-- Learning Path -->
<form id="learningForm">
    <label><strong>Learning Path:</strong></label><br><br>
    <input type="text" id="learningText" placeholder="Python Programming" required>
    <button type="submit">Get Learning Path</button>
</form>
<div id="learningResult"></div>
<script>
// Q&A
document.getElementById("qaForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = document.getElementById("question").value;

    const response = await fetch("/qa", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({text})
    });

    const data = await response.json();
    document.getElementById("qaResult").innerHTML =
"<div style='white-space: pre-wrap;'>" + data.answer + "</div>";
});

// Explanation
document.getElementById("explainForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = document.getElementById("topic").value;

    const response = await fetch("/explain", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({text})
    });

    const data = await response.json();
    document.getElementById("explanationResult").innerHTML =
        "<b>Explanation:</b> " + data.explanation;
});

// Summary
document.getElementById("summaryForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = document.getElementById("summaryText").value;

    const response = await fetch("/summarize", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({text})
    });

    const data = await response.json();
    document.getElementById("summaryResult").innerHTML =
        "<b>Summary:</b> " + data.summary;
});

// Quiz
document.getElementById("quizForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = document.getElementById("quizText").value;

    const response = await fetch("/quiz", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({text})
    });

    const data = await response.json();
    document.getElementById("quizResult").innerHTML =
        "<b>Quiz:</b> " + data.quiz;
});

// Learning Path
document.getElementById("learningForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = document.getElementById("learningText").value;

    const response = await fetch("/learn/recommendations", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({text})
    });

    const data = await response.json();
    document.getElementById("learningResult").innerHTML =
        "<b>Learning Path:</b> " + data.learning_path;
});
</script>
</body>
</html>
